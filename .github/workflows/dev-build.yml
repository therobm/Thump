name: Dev Build

# Manual, on-demand signed APK off any branch. Same build as the release
# workflow but uploads the APK as a 14-day build artifact instead of cutting a
# GitHub Release. The version carries a -dev suffix. Used to validate the
# Android build/signing pipeline before relying on the release workflow.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Compute version
        id: version
        shell: bash
        run: |
          version="$(bash .github/version.sh)-dev"
          code=$(git rev-list --count HEAD)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          echo "Version: ${version} (versionCode ${code})"

      - name: Decode keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/thump-release.jks"

      - name: Publish signed APK
        shell: bash
        run: |
          dotnet publish Thump.csproj \
            -f net10.0-android \
            -c Release \
            -p:ApplicationDisplayVersion="${{ steps.version.outputs.version }}" \
            -p:ApplicationVersion="${{ steps.version.outputs.code }}" \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=true \
            -p:AndroidSigningKeyStore="$RUNNER_TEMP/thump-release.jks" \
            -p:AndroidSigningStorePass='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -p:AndroidSigningKeyAlias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -p:AndroidSigningKeyPass='${{ secrets.ANDROID_KEY_PASSWORD }}'

      - name: Stage artifact
        id: stage
        shell: bash
        run: |
          mkdir -p artifacts
          apk=$(find . -name '*-Signed.apk' -path '*Release*' | head -1)
          if [ -z "$apk" ]; then
            echo "No signed APK found under a Release path." >&2
            find . -name '*.apk' >&2 || true
            exit 1
          fi
          cp "$apk" "artifacts/Thump-${{ steps.version.outputs.version }}.apk"
          echo "apk=artifacts/Thump-${{ steps.version.outputs.version }}.apk" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Thump-dev-${{ github.sha }}
          path: ${{ steps.stage.outputs.apk }}
          retention-days: 14
          if-no-files-found: error
